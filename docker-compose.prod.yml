services:
  streamlit:
    build: .
    container_name: automotive-streamlit
    ports:
      - "8501:8501"
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: automotive-prometheus
    ports:
      - "9090:9090"
    volumes:
      - type: bind
        source: ./prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: automotive-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_FEATURE_TOGGLES_ENABLE=
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana_data: